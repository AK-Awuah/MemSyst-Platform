version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: memsyst_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: memsyst
      POSTGRES_USER: memsyst_user
      POSTGRES_PASSWORD: memsyst_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - memsyst_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U memsyst_user -d memsyst']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: memsyst_redis
    restart: unless-stopped
    command: redis-server --requirepass memsyst_redis_secret
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - memsyst_network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'memsyst_redis_secret', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  memsyst_network:
    driver: bridge
